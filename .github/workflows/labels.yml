name: Sync Labels

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/labels.yml"
  pull_request:
    paths:
      - ".github/workflows/labels.yml"
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  sync-labels:
    uses: groundsgg/.github/.github/workflows/label-sync.yml@main
    secrets: inherit
    permissions:
      contents: read
      issues: write
